<div class="container">
    <!-- Header Section -->
    <div class="header">
      <h1>My Submitted Feedback</h1>
      <button class="btn-add" (click)="goToPostFeedback()">
        + Add New Feedback
      </button>
    </div>
  
    <!-- Loading Spinner -->
    <div *ngIf="isLoading" class="spinner-overlay">
      <div class="spinner"></div>
      <p>Loading your feedback...</p>
    </div>
  
    <div *ngIf="!isLoading">
      <!-- No Feedback Message -->
      <div *ngIf="feedbacks.length === 0" class="info">
        You have not submitted any feedback yet. Click "Add New Feedback" to share your thoughts!
      </div>
  
      <!-- Feedback Table -->
      <table *ngIf="feedbacks.length > 0" class="feedback-table">
        <thead>
          <tr>
            <th>S.No</th>
            <th>Feedback</th>
            <th>Time Posted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let feedback of feedbacks; let i = index">
            <td>{{ i + 1 }}</td>
            <td class="feedback-text">{{ feedback.FeedbackText }}</td>
            <td>{{ feedback.Date | date:'medium' }}</td>
            <td class="action-cell">
              <button class="btn-delete" (click)="showDeleteConfirmation(feedback.FeedbackId)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
